name: Build & Release

# ──────────────────────────────────────────────────────────────
#  트리거 규칙
#  - main 푸시    : 빌드 + 정적분석 + 단위테스트 (CI 검증)
#  - v* 태그 푸시 : CI 전체 + GitHub Release 생성 + zip 첨부
#  - main PR      : CI 전체 (머지 전 검증)
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════
  #  Job 1: 정적 분석 (/analyze)
  # ════════════════════════════════════════════════════════════
  static-analysis:
    name: Static Analysis (MSVC /analyze)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run MSVC Static Analysis
        run: |
          msbuild CommStack\CommStack.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RunCodeAnalysis=true `
            /p:CodeAnalysisRuleSet=NativeRecommendedRules.ruleset `
            /p:EnableCppCoreCheck=true `
            /m `
            /verbosity:minimal
        # 정적 분석 경고를 오류로 처리하지 않음 (경고 목록을 아티팩트로 수집)
        continue-on-error: false

  # ════════════════════════════════════════════════════════════
  #  Job 2: 단위 테스트
  # ════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    needs: static-analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # CommStack.dll을 먼저 빌드 (UnitTests가 링크에 필요)
      - name: Build CommStack.dll (Release)
        run: |
          msbuild CommStack\CommStack.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m /verbosity:minimal

      # UnitTests 빌드
      - name: Build UnitTests
        run: |
          msbuild Tests\UnitTests\UnitTests.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m /verbosity:minimal

      # 테스트 실행 (exit code 비 0 → 스텝 실패)
      - name: Run Unit Tests
        run: .\Bin\x64\Release\UnitTests.exe
        shell: pwsh

  # ════════════════════════════════════════════════════════════
  #  Job 3: 빌드 + 패키징 + Release
  # ════════════════════════════════════════════════════════════
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    needs: unit-tests   # 테스트 통과 후에만 릴리즈

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build CommStack.dll (Release)
        run: |
          msbuild CommStack\CommStack.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m /verbosity:minimal

      - name: Verify build output
        shell: pwsh
        run: |
          @("Bin\x64\Release\CommStack.dll", "Bin\x64\Release\CommStack.lib") | ForEach-Object {
            if (-not (Test-Path $_)) { Write-Error "누락: $_"; exit 1 }
            Write-Host "OK: $_"
          }

      - name: Package release artifacts
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            $matches[1]
          } else {
            "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }

          $dist = "dist\CommStack-$version"
          New-Item -ItemType Directory -Force -Path "$dist\Include" | Out-Null

          Copy-Item "Bin\x64\Release\CommStack.dll" "$dist\"
          Copy-Item "Bin\x64\Release\CommStack.lib" "$dist\"
          Copy-Item "Include\*.hpp"                 "$dist\Include\"
          Copy-Item "README.md"                     "$dist\"
          Copy-Item "LICENSE"                       "$dist\"

          $zipName = "CommStack-$version-win-x64.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $zipName

          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version"  | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "패키지 완료: $zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommStack-binaries
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CommStack ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          body: |
            ## CommStack ${{ env.VERSION }} — Windows x64 Release

            ✅ 정적 분석(MSVC /analyze) 통과
            ✅ 단위 테스트 통과 (SpscQueue / PacketMemoryPool / CommApi)

            ### 포함 파일
            | 파일 | 설명 |
            |------|------|
            | `CommStack.dll` | 런타임 배포용 DLL |
            | `CommStack.lib` | C++ 링크용 임포트 라이브러리 |
            | `Include/*.hpp` | 공개 헤더 (API, 채널, 자료구조) |
            | `LICENSE`       | MIT 라이선스 |

            ### C++ 프로젝트 적용
            ```
            추가 포함 디렉터리 : Include/
            추가 라이브러리    : CommStack.lib
            런타임 복사        : CommStack.dll → 실행파일 경로
            ```

            ### C# 프로젝트 적용
            ```
            CommStack.dll 을 출력 디렉터리에 복사 후 P/Invoke 사용
            (Tests/CommStack.Client/Core/NativeMethods.cs 참고)
            ```
